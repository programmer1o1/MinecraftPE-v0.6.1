name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── macOS (arm64 / Apple Silicon) ─────────────────────────────────────────
  macos:
    name: macOS (arm64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install sdl2 libpng zlib

      - name: Build (debug)
        working-directory: handheld/project/macos
        run: make -j$(sysctl -n hw.logicalcpu)

      - name: Clean before release build
        working-directory: handheld/project/macos
        run: make clean

      - name: Build (release)
        working-directory: handheld/project/macos
        run: make BUILD=release -j$(sysctl -n hw.logicalcpu)

      - name: Stage artifacts
        run: |
          mkdir -p artifact/release
          cp handheld/project/macos/minecraftpe artifact/release/
          cp -R handheld/data artifact/release/

      - name: Upload release binary
        uses: actions/upload-artifact@v4
        with:
          name: minecraftpe-macos-release
          path: artifact/release/

  # ── Linux (x86_64) ────────────────────────────────────────────────────────
  linux:
    name: Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libsdl2-dev libpng-dev zlib1g-dev libopenal-dev libgl1-mesa-dev

      - name: Build (debug)
        working-directory: handheld/project/linux
        run: make -j$(nproc)

      - name: Clean before release build
        working-directory: handheld/project/linux
        run: make clean

      - name: Build (release)
        working-directory: handheld/project/linux
        run: make BUILD=release -j$(nproc)

      - name: Stage artifacts
        run: |
          mkdir -p artifact/release
          cp handheld/project/linux/minecraftpe artifact/release/
          cp -r handheld/data artifact/release/

      - name: Upload release binary
        uses: actions/upload-artifact@v4
        with:
          name: minecraftpe-linux-release
          path: artifact/release/

  # ── Win32 (MSVC, x86) ─────────────────────────────────────────────────────
  win32:
    name: Win32 (MSVC x86)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build (Release)
        working-directory: handheld/project/win32
        run: msbuild MinecraftWin32.sln /p:Configuration=Release /p:Platform=Win32 /p:PlatformToolset=v143 /m /nologo

      - name: Copy runtime DLLs next to executable
        run: Copy-Item handheld\lib\bin\*.dll handheld\project\win32\Release\
        shell: pwsh

      - name: Copy game data next to executable
        run: Copy-Item -Recurse handheld\data handheld\project\win32\Release\
        shell: pwsh

      - name: Upload binaries + DLLs + data
        uses: actions/upload-artifact@v4
        with:
          name: minecraftpe-win32
          path: handheld/project/win32/Release/

  # ── Android (armeabi-v7a + arm64-v8a) ─────────────────────────────────────
  android:
    name: Android (armeabi-v7a + arm64-v8a, NDK r27c)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install NDK r27c
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r27c-linux.zip
          unzip -q android-ndk-r27c-linux.zip
          echo "NDK_ROOT=$PWD/android-ndk-r27c" >> $GITHUB_ENV

      - name: Build native .so
        working-directory: handheld/project/android
        run: NDK_MODULE_PATH=../lib_projects $NDK_ROOT/ndk-build -j$(nproc) NDK_PROJECT_PATH=. APP_BUILD_SCRIPT=jni/Android.mk

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      - name: Install Android SDK platform 35
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-35" "build-tools;35.0.0" 2>/dev/null | tail -1

      - name: Build debug APK
        working-directory: handheld/project/android
        run: gradle assembleDebug

      - name: Build release APK (unsigned)
        working-directory: handheld/project/android
        run: gradle assembleRelease

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: minecraftpe-android-debug
          path: handheld/project/android/build/outputs/apk/debug/*.apk

      - name: Upload release APK (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: minecraftpe-android-release
          path: handheld/project/android/build/outputs/apk/release/*.apk

  # ── Dedicated server (Linux x86, 32-bit) ──────────────────────────────────
  dedicated-server:
    name: Dedicated server (Linux x86)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install 32-bit toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-multilib g++-multilib cmake

      - name: Configure
        working-directory: handheld/project/dedicated_server
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release .

      - name: Build
        working-directory: handheld/project/dedicated_server
        run: cmake --build build -j$(nproc)

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: minecraftpe-server
          path: handheld/project/dedicated_server/build/

  # ── Platforms NOT in CI ────────────────────────────────────────────────────
  # iOS      — requires Xcode + code signing; no public runner supports this cleanly.
  # Raspberry Pi — requires Broadcom VideoCore headers (/opt/vc/) which are not
  #               available on standard runners; cross-compile toolchain is niche.

  # ── Publish release ────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [macos, linux, win32, android, dedicated-server]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Zip artifacts
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            zip -r "../${name}.zip" "$dir"
          done
          cd ..

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="build-$(date -u +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}"
          TITLE="Build ${GITHUB_SHA::7} ($(date -u +%Y-%m-%d))"
          gh release create "$TAG" *.zip \
            --title "$TITLE" \
            --notes "Automated build from commit ${GITHUB_SHA}." \
            --latest
