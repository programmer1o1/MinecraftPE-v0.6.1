name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── macOS (arm64 / Apple Silicon) ─────────────────────────────────────────
  # The only fully-supported desktop port; builds with SDL2 + OpenGL 2.1 + OpenAL.
  macos:
    name: macOS (arm64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install sdl2 libpng zlib

      - name: Build
        working-directory: handheld/project/macos
        run: make -j$(sysctl -n hw.logicalcpu)

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: minecraftpe-macos
          path: handheld/project/macos/minecraftpe

  # ── Linux (x86_64) ────────────────────────────────────────────────────────
  linux:
    name: Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libsdl2-dev libpng-dev zlib1g-dev libopenal-dev libgl1-mesa-dev

      - name: Build
        working-directory: handheld/project/linux
        run: make -j$(nproc)

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: minecraftpe-linux
          path: handheld/project/linux/minecraftpe

  # ── Win32 (MSVC, x86) ─────────────────────────────────────────────────────
  # All required libraries (GLES emulator, GLEW, libpng, zlib) are pre-bundled
  # in handheld/lib/ so no extra installs are needed.
  win32:
    name: Win32 (MSVC x86)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build (Release)
        working-directory: handheld/project/win32
        # Retarget from the original v100 (VS 2010) toolset to v143 (VS 2022)
        run: msbuild MinecraftWin32.sln /p:Configuration=Release /p:Platform=Win32 /p:PlatformToolset=v143 /m /nologo

      - name: Copy runtime DLLs next to executables
        run: Copy-Item handheld\lib\bin\*.dll handheld\project\win32\Release\
        shell: pwsh

      - name: Upload binaries + DLLs
        uses: actions/upload-artifact@v4
        with:
          name: minecraftpe-win32
          path: handheld/project/win32/Release/

  # ── Android (armeabi-v7a) ──────────────────────────────────────────────────
  # Requires NDK r16b — the last release with stlport_static (used in Application.mk).
  # NDK r18+ removed stlport; to upgrade, Application.mk would need APP_STL := c++_static.
  android:
    name: Android (armeabi-v7a, NDK r16b)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install NDK r16b
        run: |
          # NDK r16b's clang++ links against libncurses.so.5 / libtinfo.so.5.
          # Ubuntu 22.04 only ships ncurses6; create symlinks (ABI-compatible).
          sudo apt-get update -qq
          sudo apt-get install -y libncurses6 libtinfo6
          sudo ln -sf /lib/x86_64-linux-gnu/libncurses.so.6 /lib/x86_64-linux-gnu/libncurses.so.5 || true
          sudo ln -sf /lib/x86_64-linux-gnu/libtinfo.so.6 /lib/x86_64-linux-gnu/libtinfo.so.5 || true
          wget -q https://dl.google.com/android/repository/android-ndk-r16b-linux-x86_64.zip
          unzip -q android-ndk-r16b-linux-x86_64.zip
          echo "NDK_ROOT=$PWD/android-ndk-r16b" >> $GITHUB_ENV

      - name: Build
        working-directory: handheld/project/android
        # NDK_MODULE_PATH must point to lib_projects so ndk-build can find the raknet/jni module
        run: NDK_MODULE_PATH=../lib_projects $NDK_ROOT/ndk-build -j$(nproc) NDK_PROJECT_PATH=. APP_BUILD_SCRIPT=jni/Android.mk

      - name: Upload .so
        uses: actions/upload-artifact@v4
        with:
          name: minecraftpe-android
          path: handheld/project/android/libs/

  # ── Dedicated server (Linux x86, 32-bit) ──────────────────────────────────
  # Uses the CMakeLists in dedicated_server/; requires gcc-multilib for -m32.
  dedicated-server:
    name: Dedicated server (Linux x86)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install 32-bit toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-multilib g++-multilib cmake

      - name: Configure
        working-directory: handheld/project/dedicated_server
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release .

      - name: Build
        working-directory: handheld/project/dedicated_server
        run: cmake --build build -j$(nproc)

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: minecraftpe-server
          path: handheld/project/dedicated_server/build/

  # ── Platforms NOT in CI ────────────────────────────────────────────────────
  # iOS      — requires Xcode + code signing; no public runner supports this cleanly.
  # Raspberry Pi — requires Broadcom VideoCore headers (/opt/vc/) which are not
  #               available on standard runners; cross-compile toolchain is niche.
